version: 1
disable_existing_loggers: false

formatters:
  json:
    class: pythonjsonlogger.jsonlogger.JsonFormatter
    format: "%(asctime)s %(name)s %(levelname)s %(message)s"
  simple:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout

  json_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: /tmp/pipeline.log
    maxBytes: 52428800   # 50 MB
    backupCount: 5

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: json
    filename: /tmp/pipeline_errors.log
    maxBytes: 10485760   # 10 MB
    backupCount: 3

loggers:
  src.ingestion:
    level: INFO
    handlers: [console, json_file]
    propagate: false

  src.validation:
    level: INFO
    handlers: [console, json_file]
    propagate: false

  src.transformation:
    level: INFO
    handlers: [console, json_file]
    propagate: false

  src.warehouse:
    level: INFO
    handlers: [console, json_file]
    propagate: false

  src.monitoring:
    level: DEBUG
    handlers: [console, json_file]
    propagate: false

  airflow.task:
    level: INFO
    handlers: [console, json_file]
    propagate: false

  py4j:           # Suppress noisy Spark<->JVM bridge logs
    level: ERROR
    handlers: [console]
    propagate: false

  pyspark:
    level: WARNING
    handlers: [console]
    propagate: false

root:
  level: WARNING
  handlers: [console, error_file]
